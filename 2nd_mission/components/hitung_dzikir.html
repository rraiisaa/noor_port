<header class="zikir-header">
    <div class="doa-eyebrow" id="zikirEyebrow">Dzikir</div>
    <div class="doa-title" id="zikirTitle">Hitung Dzikir</div>
    <div class="doa-subtitle" id="zikirSubtitle">
        Kata-kata penuh lindungan untuk hari-hari kita.
    </div>
</header>

<main class="zikir-main">
    <div class="zikir-grid">

        <!-- Zikir Card Template -->
        <!-- Subhanallah -->
        <section class="zikir-card" data-zikir-key="subhanallah" id="zikir-card">
            <h1 class="zikir-title">Subhanallah</h1>
            <p class="zikir-subtitle">Maha Suci Allah</p>

            <div class="zikir-target">
                Target: <strong class="target-display">33</strong>
                <div class="target-options">
                    <button class="btn-target" data-target="33">33</button>
                    <button class="btn-target" data-target="99">99</button>
                    <button class="btn-target" data-target="100">100</button>
                </div>
            </div>

            <div class="zikir-counter">0</div>

            <div class="zikir-progress-bar">
                <div class="zikir-progress-fill"></div>
            </div>

            <div class="zikir-buttons">
                <button class="btn-zikir btn-increment">＋</button>
                <button class="btn-zikir btn-reset">Reset</button>
            </div>

            <div class="zikir-notification"></div>
        </section>

        <!-- Alhamdulillah -->
        <section class="zikir-card" data-zikir-key="alhamdulillah" id="zikir-card">
            <h1 class="zikir-title">Alhamdulillah</h1>
            <p class="zikir-subtitle">Segala Puji Bagi Allah</p>

            <div class="zikir-target">
                Target: <strong class="target-display">33</strong>
                <div class="target-options">
                    <button class="btn-target" data-target="33">33</button>
                    <button class="btn-target" data-target="99">99</button>
                    <button class="btn-target" data-target="100">100</button>
                </div>
            </div>

            <div class="zikir-counter">0</div>

            <div class="zikir-progress-bar">
                <div class="zikir-progress-fill"></div>
            </div>

            <div class="zikir-buttons">
                <button class="btn-zikir btn-increment">＋</button>
                <button class="btn-zikir btn-reset">Reset</button>
            </div>

            <div class="zikir-notification"></div>
        </section>

        <!-- Allahu Akbar -->
        <section class="zikir-card" data-zikir-key="allahuakbar" id="zikir-card">
            <h1 class="zikir-title">Allahuakbar</h1>
            <p class="zikir-subtitle">Allah Maha Besar</p>

            <div class="zikir-target">
                Target: <strong class="target-display">33</strong>
                <div class="target-options">
                    <button class="btn-target" data-target="33">33</button>
                    <button class="btn-target" data-target="99">99</button>
                    <button class="btn-target" data-target="100">100</button>
                </div>
            </div>

            <div class="zikir-counter">0</div>

            <div class="zikir-progress-bar">
                <div class="zikir-progress-fill"></div>
            </div>

            <div class="zikir-buttons">
                <button class="btn-zikir btn-increment">＋</button>
                <button class="btn-zikir btn-reset">Reset</button>
            </div>

            <div class="zikir-notification"></div>
        </section>

    </div>
</main>
