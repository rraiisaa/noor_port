<!DOCTYPE html>
<html lang="id" data-theme="dark" data-lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Port+ | Your Portal Ramadhan</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="/assets/noor_port_logo_green.png">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@700&family=Lato:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Global CSS -->
    <!-- <link rel="stylesheet" href="/main/style.css"> -->
    <link rel="stylesheet" href="/main/header.css">
    
    <link rel="stylesheet" href="/main/footer.css">
    <link rel="stylesheet" href="/1st_mission/kumpulan_doa.css">
    <link rel="stylesheet" href="/2nd_mission/hitung_dzikir.css">
    <link rel="stylesheet" href="/3rd_mission/kalkulator_zakat.css">
</head>

<body>

    <div class="stars-layer" id="starsLayer"></div>

    <!-- Components -->
    <div id="header-component"></div>
    <div id="doa-component"></div>
    <div id="zikir-component"></div>
    <div id="zakat-component"></div>
    <div id="footer-component"></div>

    <!-- Global Script -->
    <script src="/main/script.js"></script>
    <script src="/1st_mission/kumpulan_doa.js"></script>
    <script src="/2nd_mission/hitung_dzikir.js"></script>
    <script src="/3rd_mission/kalkulator_zakat.js"></script>

    <!-- Load Components -->
    <script>
        async function loadComponent(id, file, callback) {
            const res = await fetch(file);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;

            if (callback) callback();
        }

        loadComponent("header-component", "/main/header.html");
        loadComponent("doa-component", "/1st_mission/components/kumpulan_doa.html", () => {
            rebuildCards();
        });

        loadComponent("zikir-component", "/2nd_mission/components/hitung_dzikir.html")
            .then(() => {
                initZikirSection();
            });

        loadComponent("zakat-component", "/3rd_mission/components/kalkulator_zakat.html");
        loadComponent("footer-component", "/main/footer.html");
    </script>

</body>

</html>
