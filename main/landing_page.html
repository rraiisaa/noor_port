<!DOCTYPE html>
<html lang="id" data-theme="dark" data-lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Port+ | Your Portal Ramadhan</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="/assets/noor_port_logo_green.png">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@700&family=Lato:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Global CSS -->
    <!-- <link rel="stylesheet" href="/main/style.css"> -->
    <link rel="stylesheet" href="/main/header.css">
    <link rel="stylesheet" href="/main/footer.css">
    <link rel="stylesheet" href="/1st_mission/kumpulan_doa.css">
    <link rel="stylesheet" href="/2nd_mission/hitung_dzikir.css">
    <link rel="stylesheet" href="/3rd_mission/kalkulator_zakat.css">
    <link rel="stylesheet" href="/4rd_mission/todo-list.css">
</head>

<body>

    <div class="stars-layer" id="starsLayer"></div>

    <!-- Components -->
    <div id="header-component"></div>
    <div id="doa-component"></div>
    <div id="zikir-component"></div>
    <div id="zakat-component"></div>
    <div id="todo-component"></div>
    <div id="footer-component"></div>

    <!-- Global Script -->
    <script src="/main/script.js"></script>
    <script src="/2nd_mission/hitung_dzikir.js"></script>
    <script src="/3rd_mission/kalkulator_zakat.js"></script>
    <script src="/4rd_mission/todo-list.js"></script>

    <!-- Load Components -->
    <script>
        // Tunggu semua komponen selesai diload, baru handle hash dari URL
        // (misal user buka langsung noorport.com/#zikirSection)
        async function loadComponent(id, file, callback) {
            const res = await fetch(file);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
            if (callback) callback();
        }

        // Semua loadComponent dijalankan paralel,
        // Promise.all nunggu semuanya selesai baru scroll ke hash
        Promise.all([
            loadComponent("header-component", "/main/header.html"),
            loadComponent("doa-component", "/1st_mission/components/kumpulan_doa.html", () => rebuildCards()),
            loadComponent("zikir-component", "/2nd_mission/components/hitung_dzikir.html", () => initZikirSection()),
            loadComponent("zakat-component", "/3rd_mission/components/kalkulator_zakat.html"),
            loadComponent("todo-component", "/4rd_mission/component/todo-list.html", () => initRamadhanTodo()),
            loadComponent("footer-component", "/main/footer.html"),
        ]).then(() => {

            // Kalau URL punya hash (misal #zikirSection), scroll ke sana sekarang
            // Karena semua komponen udah di-inject, elemen-nya pasti sudah ada di DOM
            if (window.location.hash) {
                const target = document.querySelector(window.location.hash);
                if (target) {
                    setTimeout(() => target.scrollIntoView({ behavior: 'smooth' }), 100);
                }
            }

            // Active state nav — highlight link yang sesuai hash saat ini
            highlightNav();

        });

        // Update active class di nav waktu user scroll
        // IntersectionObserver lebih efisien dari scroll event listener
        function highlightNav() {
            const sections = {
                'doaRamadhan': 'prayer',
                'zikirSection': 'dzikr',
                'zakat-calculator': 'zakat',
                'ramadhanChecker': 'todolist',
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const dataId = sections[entry.target.id];
                        document.querySelectorAll('#mainNav a').forEach(a => {
                            a.classList.toggle('active', a.dataset.id === dataId);
                        });
                    }
                });
            }, { threshold: 0.3 }); // section dianggap "aktif" kalau 30% sudah keliatan

            Object.keys(sections).forEach(id => {
                const el = document.getElementById(id);
                if (el) observer.observe(el);
            });
        }
    </script>

</body>

</html>
